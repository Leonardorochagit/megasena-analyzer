name: Conferir MegaSena e Notificar

on:
  schedule:
    # Sorteios: Terça, Quinta e Sábado
    # Roda às 21:30, 22:30 e 23:30 horário de Brasília (UTC-3)
    - cron: '30 0 * * 3,5,0'   # 21:30 BRT (Ter, Qui, Sáb → Wed, Fri, Sun UTC)
    - cron: '30 1 * * 3,5,0'   # 22:30 BRT
    - cron: '30 2 * * 3,5,0'   # 23:30 BRT

  workflow_dispatch:  # Permite rodar manualmente pelo GitHub
    inputs:
      concurso:
        description: 'Concurso específico para reenviar se não houver conferência nova'
        required: false
        type: string

jobs:
  conferir:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          pip install requests pandas numpy scikit-learn

      - name: Sincronizar dados mais recentes
        run: |
          git pull --rebase origin main || true

      - name: Gerar piloto_config.json a partir de secrets
        run: |
          python -c "
          import json, os
          cfg = {
            'ativo': True,
            'intervalo': 60,
            'qtd_numeros': 15,
            'cartoes_por_est': 10,
            'cartoes_ensemble': 40,
            'ensemble_only': False,
            'whatsapp_ativo': bool(os.environ.get('WHATSAPP_TELEFONE')),
            'whatsapp_telefone': os.environ.get('WHATSAPP_TELEFONE', ''),
            'whatsapp_apikey': os.environ.get('WHATSAPP_APIKEY', ''),
            'bolao_threshold': 100000000,
            'bolao_qtd_numeros': 13,
            'bolao_estrategias': ['misto', 'consenso']
          }
          with open('piloto_config.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          print('piloto_config.json gerado com sucesso')
          "
        env:
          WHATSAPP_TELEFONE: ${{ secrets.WHATSAPP_TELEFONE }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}

      - name: Executar conferência e notificação
        env:
          WHATSAPP_TELEFONE: ${{ secrets.WHATSAPP_TELEFONE }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
          REENVIAR_ULTIMA_CONFERENCIA: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          REENVIAR_CONCURSO: ${{ inputs.concurso }}
        run: |
          python scripts/conferir_e_notificar.py

      - name: Commit dos dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meus_cartoes.json historico_analises.json
          git add data/megasena_historico.csv 2>/dev/null || true
          git add data/cartoes_arquivo_*.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "🤖 Auto: conferência $(date -u -d '-3 hours' +'%Y-%m-%d %H:%M') BRT"
          git pull --rebase origin main || true
          git push
